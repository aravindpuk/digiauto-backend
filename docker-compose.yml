services:

  db:
    image: postgres:14
    container_name: digiauto_db

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: digiauto_web

    env_file:
      - .env

    depends_on:
      - db

    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: digiauto_nginx

    ports:
      - "80:80"
      - "443:443"
      

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro


    depends_on:
      - web

volumes:
  postgres_data: